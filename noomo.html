<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Blaziken — Noomo replica hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=neue-machina@400,500,700,800&display=swap" rel="stylesheet">
<style>
  :root{
    --fg:#0a0a0a;
    --muted:#5a6373;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{
    color:var(--fg);
    font-family:"Geist","Inter",sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
    height:100%;
  }
  ::selection{background:#0a0a0a;color:#fff}

  /* ── Iridescent pastel background ─────────────────── */
  .bg{
    position:fixed;inset:0;z-index:0;
    background:
      radial-gradient(60% 50% at 78% 22%, rgba(255,210,200,.55) 0%, rgba(255,210,200,0) 60%),
      radial-gradient(70% 60% at 18% 28%, rgba(190,210,255,.6) 0%, rgba(190,210,255,0) 60%),
      radial-gradient(80% 70% at 50% 90%, rgba(220,225,235,.85) 0%, rgba(220,225,235,0) 60%),
      linear-gradient(180deg, #c4ced9 0%, #c0c9d4 50%, #bdc7d2 100%);
  }
  .bg::after{
    content:"";position:absolute;inset:0;
    background:
      radial-gradient(40% 40% at 30% 60%, rgba(255,255,255,.35) 0%, transparent 60%),
      radial-gradient(35% 35% at 75% 50%, rgba(255,235,220,.25) 0%, transparent 60%);
    mix-blend-mode:overlay;
  }

  /* ── WebGL canvas (chrome ribbon) ──────────────────── */
  #gl{
    position:fixed;inset:0;z-index:1;
    width:100%;height:100%;
    pointer-events:none;
  }

  /* ── Top navigation ────────────────────────────────── */
  nav{
    position:fixed;top:0;left:0;right:0;z-index:10;
    display:flex;justify-content:space-between;align-items:center;
    padding:30px 44px;
  }
  nav .logo{
    font-family:"Neue Machina","Geist",sans-serif;
    font-size:22px;font-weight:800;letter-spacing:-.04em;
    color:#000;line-height:1;
    text-transform:lowercase;
  }
  nav .links{
    display:flex;gap:44px;
    font-family:"Neue Machina","Geist",sans-serif;
    font-size:12px;letter-spacing:.14em;text-transform:uppercase;
    font-weight:500;color:#000;
  }
  nav .links a{
    position:relative;
    color:#000;
    transition:opacity .25s;
  }
  nav .links a::after{
    content:"";position:absolute;left:0;right:0;bottom:-6px;
    height:1px;background:#000;
    transform:scaleX(0);transform-origin:left;
    transition:transform .35s cubic-bezier(.65,0,.35,1);
  }
  nav .links a:hover::after{transform:scaleX(1)}

  /* ── Hero / headline ───────────────────────────────── */
  .hero{
    position:relative;z-index:5;
    height:100vh;width:100%;
    display:flex;align-items:center;
    padding:0 44px;
  }
  h1{
    width:100%;
    font-family:"Neue Machina","Geist",sans-serif;
    font-weight:800;
    font-size:clamp(40px,7.4vw,128px);
    line-height:.95;
    letter-spacing:-.03em;
    color:#0a0a0a;
  }
  h1 .line{
    display:flex;justify-content:space-between;align-items:baseline;
    width:100%;
  }
  h1 .line .word{
    display:inline-block;
    overflow:hidden;
  }
  h1 .line .word > span{
    display:inline-block;
    transform:translateY(105%);
    transition:transform 1.1s cubic-bezier(.2,.85,.25,1);
  }
  .ready h1 .line .word > span{transform:translateY(0)}
  /* Stagger */
  .ready h1 .line:nth-child(1) .word > span{transition-delay:.05s}
  .ready h1 .line:nth-child(2) .word > span{transition-delay:.18s}
  .ready h1 .line:nth-child(3) .word > span{transition-delay:.30s}

  /* ── Caption bottom-right ──────────────────────────── */
  .caption{
    position:fixed;right:44px;bottom:36px;z-index:6;
    max-width:280px;text-align:right;
    font-family:"Geist",sans-serif;
    font-size:13px;line-height:1.45;color:#1f2530;
    opacity:0;transform:translateY(12px);
    transition:opacity .9s ease .9s, transform .9s ease .9s;
  }
  .ready .caption{opacity:1;transform:translateY(0)}

  /* ── Bottom-left mark ──────────────────────────────── */
  .mark{
    position:fixed;left:44px;bottom:36px;z-index:6;
    font-family:"Geist",sans-serif;
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:#1f2530;
    display:flex;align-items:center;gap:10px;
    opacity:0;transition:opacity .9s ease 1.1s;
  }
  .ready .mark{opacity:1}
  .mark .dot{
    display:inline-block;width:8px;height:8px;border-radius:50%;
    background:#5cc26b;box-shadow:0 0 0 3px rgba(92,194,107,.2);
  }

  @media (max-width:780px){
    nav{padding:20px 22px}
    nav .links{display:none}
    .hero{padding:0 22px}
    h1{font-size:14vw}
    h1 .line{flex-wrap:wrap;gap:.2em}
    .caption{right:22px;bottom:24px;max-width:220px;font-size:11px}
    .mark{left:22px;bottom:24px;font-size:9px}
  }
</style>
</head>
<body>

<div class="bg"></div>
<canvas id="gl"></canvas>

<nav>
  <a href="#" class="logo">blaziken</a>
  <div class="links">
    <a href="#">WORK</a>
    <a href="#">STUDIO</a>
    <a href="#">PRACTICES</a>
    <a href="#">INSIGHTS</a>
    <a href="#">CONNECT</a>
  </div>
</nav>

<section class="hero">
  <h1>
    <div class="line">
      <span class="word"><span>SOFTWARE</span></span>
      <span class="word"><span>THAT</span></span>
      <span class="word"><span>THINKS</span></span>
    </div>
    <div class="line">
      <span class="word"><span>WITH</span></span>
      <span class="word"><span>YOUR</span></span>
      <span class="word"><span>TEAM.</span></span>
    </div>
    <div class="line">
      <span class="word"><span>BUILT</span></span>
      <span class="word"><span>FOR</span></span>
      <span class="word"><span>SCALE.</span></span>
    </div>
  </h1>
</section>

<div class="caption">
  shipping AI-native systems, automation,<br/>
  and intelligence that make teams<br/>
  move faster every quarter.
</div>

<div class="mark">
  <span class="dot"></span> AVAILABLE FOR NEW PROJECTS · 2026
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ── Renderer / scene / camera ────────────────────────
const canvas = document.getElementById('gl');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 100);
camera.position.set(0, 0, 6);

// ── Environment for chrome reflections ───────────────
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

// ── Chrome ribbon: TubeGeometry along a flowing curve ─
const basePoints = [
  new THREE.Vector3(-3.2, -1.1,  0.0),
  new THREE.Vector3(-2.0,  0.6,  0.6),
  new THREE.Vector3(-0.7, -0.4, -0.4),
  new THREE.Vector3( 0.6,  0.7,  0.5),
  new THREE.Vector3( 1.9, -0.5, -0.3),
  new THREE.Vector3( 3.2,  0.9,  0.0),
];

function makeCurve(t){
  const pts = basePoints.map((p, i) => {
    const k = i / (basePoints.length - 1);
    return new THREE.Vector3(
      p.x,
      p.y + Math.sin(t * 0.5 + k * 6.0) * 0.18,
      p.z + Math.cos(t * 0.4 + k * 5.0) * 0.18
    );
  });
  return new THREE.CatmullRomCurve3(pts, false, 'catmullrom', 0.5);
}

let curve = makeCurve(0);
let tubeGeo = new THREE.TubeGeometry(curve, 240, 0.22, 48, false);
const chrome = new THREE.MeshStandardMaterial({
  color: 0xffffff,
  metalness: 1.0,
  roughness: 0.06,
  envMapIntensity: 1.4,
});
const ribbon = new THREE.Mesh(tubeGeo, chrome);
scene.add(ribbon);

// Soft fill light (mostly env handles it)
const dir = new THREE.DirectionalLight(0xffffff, 0.4);
dir.position.set(2, 3, 5);
scene.add(dir);

// ── Resize ───────────────────────────────────────────
function resize(){
  const w = innerWidth, h = innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  // Frame the ribbon nicely on different aspect ratios
  camera.position.z = w / h > 1.4 ? 5.6 : 7.0;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// ── Mouse parallax ───────────────────────────────────
let mx = 0, my = 0, tmx = 0, tmy = 0;
window.addEventListener('pointermove', e => {
  tmx = (e.clientX / innerWidth  - 0.5) * 2;
  tmy = (e.clientY / innerHeight - 0.5) * 2;
});

// ── Animate ──────────────────────────────────────────
const clock = new THREE.Clock();
function tick(){
  const t = clock.getElapsedTime();

  // Rebuild tube along a slowly morphing curve
  curve = makeCurve(t);
  tubeGeo.dispose();
  tubeGeo = new THREE.TubeGeometry(curve, 240, 0.22, 48, false);
  ribbon.geometry = tubeGeo;

  // Slow rotation for richer reflections
  ribbon.rotation.z = Math.sin(t * 0.15) * 0.12;
  ribbon.rotation.y = Math.cos(t * 0.10) * 0.18;

  // Mouse parallax
  mx += (tmx - mx) * 0.06;
  my += (tmy - my) * 0.06;
  ribbon.position.x = mx * 0.25;
  ribbon.position.y = -my * 0.15;

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
tick();

// ── Trigger reveal once everything is ready ──────────
requestAnimationFrame(() => document.body.classList.add('ready'));
</script>
</body>
</html>
